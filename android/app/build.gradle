plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ebookdrive.app'
    compileSdk 34

    defaultConfig {
        applicationId 'com.ebookdrive.app'
        minSdk 19
        targetSdk 28
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
