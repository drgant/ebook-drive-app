name: build-apk

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk ../ebook-drive.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebook-drive-apk
          path: ebook-drive.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 이북 다운로드 앱 (최신)
          files: ebook-drive.apk
